# ============================================
# DBHub Configuration Template
# ============================================
# Copy this file to dbhub.toml and fill in your database credentials.
# NEVER commit dbhub.toml to version control!
#
# For more information, see CLAUDE.md MCPs Available section
# ============================================

[[sources]]
id = "your-project"
type = "sqlserver" # Options: sqlserver, postgres, mysql, sqlite
host = "your-database-server.database.windows.net"
port = 1433
database = "your-database-name"
user = "your_username"
password = "your_password"
sslmode = "require"
